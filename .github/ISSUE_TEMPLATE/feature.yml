name: Feature proposal
description: Propose a new feature within current scope
title: "feat: "
labels: ["enhancement", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening this issue:
        1. Read [CHARTER.md §3](../blob/main/CHARTER.md) (IN scope) and §13 (refused list).
        2. If the feature is on the refused list, use the `ADR proposal` template instead.
        3. If the feature is genuinely user-visible, it might be a `feat:` (minor bump). If not, it might just be a `fix:` or `refactor:`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what does this feature do, for whom, and why now?
      placeholder: "As a self-hosted user of Polaris, I want X so that Y..."
    validations:
      required: true

  - type: input
    id: charter-section
    attributes:
      label: CHARTER.md section that authorizes this
      description: 'Cite the section number (e.g. "§3 IN scope: Notifiche")'
      placeholder: "§3 IN scope: ..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope boundary
      description: What this DOES, and explicitly what this does NOT do
      placeholder: |
        DOES: ...
        DOES NOT: ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of concrete, testable criteria that must be true when this is "done"
    validations:
      required: true

  - type: textarea
    id: out-of-scope-check
    attributes:
      label: Out-of-scope check
      description: Confirm this is NOT on the refused list (§13). If unsure, paste the closest §13 item and explain the distinction.
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      options:
        - M0 — Foundation
        - M1 — MVP CCMeter-parity
        - M2 — Beta
        - Not yet scheduled
    validations:
      required: true
